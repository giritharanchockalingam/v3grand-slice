# ─── V3 Grand: Local Development Infrastructure ─────────────────────
# Run: docker compose up -d
# Postgres: localhost:5432  Redis: localhost:6379  NATS: localhost:4222 (JetStream)
version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: v3grand
    ports:
      - '5433:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres']
      interval: 5s
      timeout: 3s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - '6379:6379'
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s

  nats:
    image: nats:latest
    command: ['-js', '-m', '8222']
    ports:
      - '4222:4222'
      - '8222:8222'

volumes:
  pgdata:
