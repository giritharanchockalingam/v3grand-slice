# V3 Grand — Enterprise CI/CD Pipeline
# Comprehensive build validation with strict quality gates and Docker image generation
# All steps are blocking (no continue-on-error) for production reliability

name: ci

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master, develop]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    name: Build, Test, and Validate
    runs-on: ubuntu-latest
    timeout-minutes: 30

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: v3grand
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    env:
      DATABASE_URL: postgres://postgres:postgres@localhost:5432/v3grand
      NODE_ENV: test

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile
        shell: bash

      - name: Lint
        run: pnpm lint
        shell: bash

      - name: Type check
        run: pnpm typecheck
        shell: bash

      - name: Build
        run: pnpm build
        shell: bash

      - name: Test
        run: pnpm test --run
        shell: bash

      - name: Test coverage
        run: pnpm test:coverage
        continue-on-error: true
        shell: bash

  docker-build:
    name: Build Docker Images
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: ci
    if: success()

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build API Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./packages/api/Dockerfile
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max
          tags: v3grand-api:latest

      - name: Build UI Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./packages/ui/Dockerfile
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max
          tags: v3grand-ui:latest

  security-scan:
    name: Security & Dependency Check
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile
        shell: bash

      - name: Audit dependencies
        run: pnpm audit --prod
        continue-on-error: true
        shell: bash
