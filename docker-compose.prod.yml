# V3 Grand Platform - Production Docker Compose
# Enterprise-grade infrastructure with health checks, networking, and data persistence
# This configuration provides secure inter-service communication and proper resource management

version: '3.9'

services:
  # ─── PostgreSQL Database ────────────────────────────────────────────
  # Primary data store with persistence, health checks, and secure configuration
  postgres:
    image: postgres:16-alpine
    container_name: v3grand-postgres

    # Environment variables for PostgreSQL initialization
    environment:
      POSTGRES_USER: ${DB_USER:-v3grand}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-changeme}
      POSTGRES_DB: ${DB_NAME:-v3grand_prod}
      POSTGRES_INITDB_ARGS: "--encoding=UTF8 --locale=en_US.UTF-8"
      PGTZ: UTC

    # Volume mounts for data persistence and backups
    volumes:
      # Primary data directory - persists across container restarts
      - postgres_data:/var/lib/postgresql/data
      # Initial schema migration (if needed)
      - ./packages/db/src/migrations:/docker-entrypoint-initdb.d:ro

    # Port mapping - only expose on internal network in production
    ports:
      - "5432:5432"

    # Health check configuration
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-v3grand} -d ${DB_NAME:-v3grand_prod}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

    # Restart policy for high availability
    restart: unless-stopped

    # Resource limits to prevent container from consuming all host resources
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 2G
        reservations:
          cpus: '1'
          memory: 1G

    # Security options
    security_opt:
      - no-new-privileges:true

    # Logging configuration
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

    # Network
    networks:
      - v3grand-network

  # ─── Redis Cache ────────────────────────────────────────────────────
  # High-performance in-memory data store for caching and session management
  redis:
    image: redis:7-alpine
    container_name: v3grand-redis

    # Command with security settings
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD:-changeme}
      --appendonly yes
      --maxmemory 512mb
      --maxmemory-policy allkeys-lru

    # Volume mount for data persistence (AOF - Append Only File)
    volumes:
      - redis_data:/data

    # Port mapping - only expose on internal network
    ports:
      - "6379:6379"

    # Health check configuration
    healthcheck:
      test: ["CMD", "redis-cli", "--raw", "incr", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 10s

    # Restart policy
    restart: unless-stopped

    # Resource limits
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 1G
        reservations:
          cpus: '0.5'
          memory: 512M

    # Security
    security_opt:
      - no-new-privileges:true

    # Logging
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

    # Network
    networks:
      - v3grand-network

  # ─── Fastify API Service ────────────────────────────────────────────
  # Backend API server with health checks and startup dependencies
  api:
    build:
      context: .
      dockerfile: packages/api/Dockerfile
    container_name: v3grand-api

    # Environment variables for API configuration
    environment:
      # Core API settings
      NODE_ENV: production
      PORT: 3001
      LOG_LEVEL: info

      # Database connection
      DATABASE_URL: postgresql://${DB_USER:-v3grand}:${DB_PASSWORD:-changeme}@postgres:5432/${DB_NAME:-v3grand_prod}

      # Redis connection
      REDIS_URL: redis://:${REDIS_PASSWORD:-changeme}@redis:6379

      # API security headers
      CORS_ORIGIN: ${API_CORS_ORIGIN:-https://app.v3grand.com}

      # Logging and observability
      ENABLE_REQUEST_LOGGING: "true"
      ENABLE_STRUCTURED_LOGS: "true"

    # Port mapping
    ports:
      - "3001:3001"

    # Volume mounts
    volumes:
      # Mount for application logs
      - api_logs:/app/logs

    # Service dependencies - wait for postgres and redis to be healthy
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

    # Health check configuration
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

    # Restart policy with backoff
    restart: unless-stopped

    # Resource limits
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 2G
        reservations:
          cpus: '1'
          memory: 1G

    # Security options
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE

    # Logging configuration
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"
        labels: "service=api"

    # Network
    networks:
      - v3grand-network

  # ─── Next.js UI Service ─────────────────────────────────────────────
  # Frontend application with health checks and environment configuration
  ui:
    build:
      context: .
      dockerfile: packages/ui/Dockerfile
    container_name: v3grand-ui

    # Environment variables for Next.js frontend
    environment:
      # Core UI settings
      NODE_ENV: production
      PORT: 3000
      NEXT_TELEMETRY_DISABLED: "1"

      # API endpoint for frontend to connect to
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://api:3001}

      # Security headers for Next.js
      NEXT_PUBLIC_APP_ENV: production

    # Port mapping
    ports:
      - "3000:3000"

    # Volume mounts
    volumes:
      # Mount for application logs
      - ui_logs:/app/logs

    # Service dependencies - wait for API to be healthy
    depends_on:
      api:
        condition: service_healthy

    # Health check configuration
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

    # Restart policy
    restart: unless-stopped

    # Resource limits
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 1G
        reservations:
          cpus: '0.5'
          memory: 512M

    # Security options
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE

    # Logging configuration
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"
        labels: "service=ui"

    # Network
    networks:
      - v3grand-network

# ─── Persistent Volumes ──────────────────────────────────────────────
# Named volumes for data persistence across container restarts
volumes:
  postgres_data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ${DB_DATA_PATH:-./data/postgres}

  redis_data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ${REDIS_DATA_PATH:-./data/redis}

  api_logs:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ${API_LOGS_PATH:-./logs/api}

  ui_logs:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ${UI_LOGS_PATH:-./logs/ui}

# ─── Network Configuration ──────────────────────────────────────────
# Custom bridge network for service isolation and internal communication
networks:
  v3grand-network:
    driver: bridge
    driver_opts:
      com.docker.network.bridge.name: br-v3grand
    ipam:
      config:
        - subnet: 172.28.0.0/16
          gateway: 172.28.0.1
